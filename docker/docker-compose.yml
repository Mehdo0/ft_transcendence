services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: trsc_back
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ./database_data:/app/data
    ports:
      - "8000:8000"
    networks:
      - trsc_net

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: trsc_front
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ../src:/app/src
      - ../static:/app/static
      - /app/node_modules
    networks:
      - trsc_net

networks:
  trsc_net:
    driver: bridge
